events { worker_connections 1024; }
http {
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
  server_tokens off;
  upstream backend { server backend:8000; }
  upstream frontend { server frontend:3000; }
  server {
    listen 80;
    client_max_body_size 20m;
    add_header X-Content-Type-Options nosniff always;
    add_header Content-Security-Policy "frame-ancestors 'self' http://localhost:* http://127.0.0.1:*" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    location /api/ {
      limit_req zone=api_limit burst=40 nodelay;
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ~ ^/(health|ready|metrics)$ { proxy_pass http://backend; }
    location ~ ^/(docs|redoc|openapi.json) { proxy_pass http://backend; }
    location / { proxy_pass http://frontend; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
  }
}
