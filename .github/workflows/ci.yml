name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./cic-frontend-demo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './cic-frontend-demo/package-lock.json'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Type check
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build
